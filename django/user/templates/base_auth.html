<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %}</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <style>
        body{
            margin:0;
            padding:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#1e3c72,#2a5298);
            font-family:Arial, Helvetica, sans-serif;
        }

        .auth-box{
            width:380px;
            padding:35px;
            border-radius:15px;
            background:rgba(255,255,255,0.95);
            box-shadow:0 15px 35px rgba(0,0,0,0.3);
            transition:0.3s;
        }

        .auth-box:hover{
            transform:translateY(-5px);
        }

        .auth-box h2{
            text-align:center;
            margin-bottom:25px;
            font-weight:bold;
        }

        .auth-box input{
            width:100%;
            padding:10px;
            margin:10px 0;
            border-radius:8px;
            border:1px solid #ccc;
        }

        .auth-box button{
            width:100%;
            padding:10px;
            border:none;
            border-radius:8px;
            background:#2a5298;
            color:white;
            font-weight:bold;
            transition:0.3s;
        }

        .auth-box button:hover{
            background:#1e3c72;
        }

        .auth-link{
            display:block;
            text-align:center;
            margin-top:15px;
        }

    </style>
</head>

<body>

    {% block body_block %}
    {% endblock %}

</body>
</html>

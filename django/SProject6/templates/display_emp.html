<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <center>
        <h1>
            EMP TABLE
        </h1>
        <table border="3px">
            <tr>
                <th>empno</th>
                <th>ename</th>
                <th>job</th>
                <th>sal</th>
                <th>comm</th>
                <th>hiredate</th>
                <th>mgr</th>
                <th>deptno</th>
            </tr>



        {% for eo in QLEO %}
            <tr>
                <td>{{ eo.empno  }}</td>
                <td>{{ eo.ename  }}</td>
                <td>{{ eo.job  }}</td>
                <td>{{ eo.sal  }}</td>
                <td>{{ eo.comm  }}</td>
                <td>{{ eo.hiredate  }}</td>
                <td>{{ eo.mgr.empno  }}</td>
                <td>{{ eo.deptno.deptno  }}</td>
            </tr>   

        {%  endfor %}

        </table>
    </center>
</body>
</html>
